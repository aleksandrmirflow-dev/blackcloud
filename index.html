<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACK CLOUD</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:-apple-system,BlinkMacSystemFont;
background:#000;
color:white;
}

/* HEADER */
header{
position:sticky;
top:0;
padding:16px;
font-size:20px;
font-weight:700;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(20px);
}

/* SEARCH */
.search{
margin:10px 16px;
padding:14px;
border-radius:16px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
color:#aaa;
}

/* CATEGORY PILLS */
.categories{
display:flex;
gap:10px;
overflow:auto;
padding:10px 16px;
}
.categories button{
border:none;
padding:8px 16px;
border-radius:20px;
background:rgba(255,255,255,0.08);
color:#ccc;
}
.categories .active{
background:white;
color:black;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:16px;
padding:16px;
}

/* CARD */
.card{
border-radius:22px;
padding:14px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
box-shadow:0 10px 30px rgba(0,0,0,0.6);
transition:0.2s;
}
.card:active{
transform:scale(0.97);
}

/* IMAGE */
.img{
height:140px;
border-radius:16px;
background:linear-gradient(135deg,#ff7a18,#32d2aa);
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
}

/* TEXT */
.title{margin-top:10px;font-size:15px}
.meta{font-size:12px;color:#aaa}
.price{font-size:20px;font-weight:700;margin-top:6px}

/* SELECT */
select{
margin-top:8px;
width:100%;
padding:10px;
border-radius:12px;
border:none;
background:#1a1a22;
color:white;
}

/* BUTTON */
button.buy{
margin-top:10px;
padding:12px;
border:none;
border-radius:14px;
background:#0a84ff;
color:white;
font-weight:700;
}

/* CART BUTTON */
.cart{
position:fixed;
bottom:80px;
right:20px;
background:#0a84ff;
padding:16px;
border-radius:50%;
font-weight:700;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

/* TAB BAR */
.tabbar{
position:fixed;
bottom:0;
width:100%;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(20px);
display:flex;
justify-content:space-around;
padding:10px 0;
}
.tabbar div{
font-size:12px;
color:#aaa;
text-align:center;
}
.tabbar .active{
color:#0a84ff;
}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.6);
display:none;
align-items:flex-end;
}
.sheet{
width:100%;
background:#111;
border-radius:24px 24px 0 0;
padding:20px;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:12px;
border:none;
background:#1a1a22;
color:white;
}
</style>
</head>

<body>

<header>BLACK CLOUD</header>

<div class="search">🔍 Поиск вкуса...</div>

<div class="categories">
<button class="active">Все</button>
<button>Одноразки</button>
<button>Жидкости</button>
<button>POD</button>
</div>

<div class="grid" id="products"></div>

<div class="cart" onclick="openCart()">🛒</div>

<div class="modal" id="cartModal">
<div class="sheet">
<h3>Корзина</h3>
<div id="cartItems"></div>
<p id="total"></p>
<button class="buy" onclick="checkout()">Оформить</button>
</div>
</div>

<div class="modal" id="orderModal">
<div class="sheet">
<h3>Оформление</h3>
<input placeholder="Имя">
<input placeholder="Телефон">
<input placeholder="Адрес">
<button class="buy">Отправить</button>
</div>
</div>

<div class="tabbar">
<div class="active">🏠<br>Главная</div>
<div>🔍<br>Поиск</div>
<div>🛒<br>Корзина</div>
</div>

<script>

const data=[
{name:'Vapengo 6000',puff:'6000 PUFF',str:'5%',price:700,flavors:['Манго','Арбуз','Клубника']},
{name:'ELF BAR 5000',puff:'5000 PUFF',str:'5%',price:800,flavors:['Черника','Мята','Виноград']},
{name:'BRZG 30ml',puff:'Жидкость',str:'20mg',price:400,flavors:['Крем-сода','Бураттино','Малина']}
]

const grid=document.getElementById('products')

data.forEach(p=>{
const el=document.createElement('div')
el.className='card'
el.innerHTML=`
<div class="img">${p.name}</div>
<div class="title">${p.name}</div>
<div class="meta">${p.puff} • ${p.str}</div>
<select>${p.flavors.map(f=>`<option>${f}</option>`).join('')}</select>
<div class="price">${p.price} ₽</div>
<button class="buy" onclick="add('${p.name}',this.previousElementSibling.value,${p.price})">Добавить</button>
`
grid.appendChild(el)
})

let cart=[]

function add(name,flavor,price){
cart.push({name,flavor,price})
}

function openCart(){
let html='',sum=0
cart.forEach(i=>{
html+=`${i.name} (${i.flavor}) - ${i.price}₽<br>`
sum+=i.price
})
document.getElementById('cartItems').innerHTML=html
document.getElementById('total').innerText='Итого: '+sum+'₽'
document.getElementById('cartModal').style.display='flex'
}

function checkout(){
document.getElementById('cartModal').style.display='none'
document.getElementById('orderModal').style.display='flex'
}

</script>

</body>
</html>
