<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACK CLOUD</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:system-ui;
background:#0b0b0f;
color:white;
}

header{
position:sticky;
top:0;
background:#0b0b0f;
padding:16px;
font-weight:700;
font-size:20px;
display:flex;
justify-content:space-between;
}

.search{
margin:10px 16px;
padding:12px;
background:#15151c;
border-radius:12px;
color:#aaa;
}

.categories{
display:flex;
gap:10px;
overflow:auto;
padding:10px 16px;
}

.categories button{
background:#15151c;
border:none;
color:white;
padding:8px 14px;
border-radius:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
padding:16px;
}

.card{
background:linear-gradient(145deg,#15151c,#0d0d13);
border-radius:16px;
padding:12px;
}

.img{
height:120px;
border-radius:12px;
background:linear-gradient(135deg,#ff7a18,#32d2aa);
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
}

.title{margin-top:8px;font-size:14px}
.meta{font-size:12px;color:#aaa}
.price{font-size:18px;font-weight:700;margin-top:6px}

select{
width:100%;
margin-top:6px;
padding:8px;
border-radius:8px;
border:none;
background:#1a1a22;
color:white;
}

button{
margin-top:8px;
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#2f7cff;
color:white;
font-weight:600;
}

.cart{
position:fixed;
bottom:20px;
right:20px;
background:#2f7cff;
padding:14px;
border-radius:50px;
}

.roulette{
margin:16px;
padding:20px;
background:#15151c;
border-radius:16px;
text-align:center;
}

.modal{
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
}

.modalbox{
background:#111;
padding:20px;
border-radius:14px;
width:90%;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
background:#1a1a22;
color:white;
}
</style>
</head>

<body>

<header>
BLACK CLOUD
</header>

<div class="search">Поиск вкуса...</div>

<div class="categories">
<button onclick="scrollToCat('all')">Все</button>
<button onclick="scrollToCat('vape')">Одноразки</button>
<button onclick="scrollToCat('liq')">Жидкости</button>
</div>

<div class="grid" id="products"></div>

<div class="roulette">
<h3>🎰 Рулетка</h3>
<button onclick="spin()">Крутить</button>
<div id="win"></div>
</div>

<div class="cart" onclick="openCart()">
🛒 <span id="count">0</span>
</div>

<div class="modal" id="cartModal">
<div class="modalbox">
<h3>Корзина</h3>
<div id="cartItems"></div>
<p id="total"></p>
<button onclick="checkout()">Оформить</button>
</div>
</div>

<div class="modal" id="orderModal">
<div class="modalbox">
<h3>Оформление</h3>
<input placeholder="Имя">
<input placeholder="Телефон">
<input placeholder="Адрес">
<button onclick="sendOrder()">Отправить</button>
</div>
</div>

<script>

const data = [
{cat:'vape',name:'Vapengo 6000',puff:'6000 PUFF',str:'5%',price:700,flavors:['Манго','Клубника','Арбуз']},
{cat:'vape',name:'ELF BAR 5000',puff:'5000 PUFF',str:'5%',price:800,flavors:['Черника','Мята','Виноград']},
{cat:'liq',name:'BRZG 30ml',puff:'Жидкость',str:'20mg',price:400,flavors:['Крем-сода','Бураттино','Малина']}
];

const grid = document.getElementById('products');

data.forEach(p=>{
const el=document.createElement('div')
el.className='card'
el.innerHTML=`
<div class="img">${p.name}</div>
<div class="title">${p.name}</div>
<div class="meta">${p.puff} • ${p.str}</div>
<select>
${p.flavors.map(f=>`<option>${f}</option>`).join('')}
</select>
<div class="price">${p.price} ₽</div>
<button onclick="add('${p.name}',this.previousElementSibling.value,${p.price})">Добавить</button>
`
grid.appendChild(el)
})

let cart=[]
function add(name,flavor,price){
cart.push({name,flavor,price})
document.getElementById('count').innerText=cart.length
}

function openCart(){
let html=''
let sum=0
cart.forEach(i=>{
html+=`${i.name} (${i.flavor}) - ${i.price}₽<br>`
sum+=i.price
})
document.getElementById('cartItems').innerHTML=html
document.getElementById('total').innerText='Итого: '+sum+'₽'
document.getElementById('cartModal').style.display='flex'
}

function checkout(){
document.getElementById('cartModal').style.display='none'
document.getElementById('orderModal').style.display='flex'
}

function sendOrder(){
alert('Заказ отправлен в Telegram')
}

function spin(){
const prizes=['10%','20%','Бесплатка','Промокод','Ничего']
document.getElementById('win').innerText='Вы выиграли: '+prizes[Math.floor(Math.random()*prizes.length)]
}

function scrollToCat(c){
window.scrollTo({top:0,behavior:'smooth'})
}

</script>

</body>
  </html>
