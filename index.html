<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACK CLOUD</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background: radial-gradient(circle at top,#1a1a2e,#0b0b12);
color:#fff;
}

.header{
padding:20px;
font-size:24px;
font-weight:700;
}

.search{
margin:0 15px 15px;
padding:12px;
border-radius:12px;
background:#1c1c2b;
border:none;
color:#aaa;
width:calc(100% - 30px);
}

.tabs{
display:flex;
gap:10px;
overflow:auto;
padding:0 15px 15px;
}

.tab{
padding:8px 14px;
background:#1c1c2b;
border-radius:20px;
color:#aaa;
white-space:nowrap;
}

.tab.active{
background:#fff;
color:#000;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
padding:15px;
}

.card{
background:#141421;
border-radius:18px;
padding:14px;
position:relative;
overflow:hidden;
}

.card img{
width:100%;
height:140px;
object-fit:contain;
margin-bottom:10px;
}

.title{
font-weight:600;
margin-bottom:4px;
}

.sub{
font-size:12px;
color:#aaa;
margin-bottom:8px;
}

select{
width:100%;
padding:8px;
border-radius:10px;
background:#1f1f30;
border:none;
color:#fff;
margin-bottom:10px;
}

.bottom{
display:flex;
justify-content:space-between;
align-items:center;
}

.price{
font-size:18px;
font-weight:700;
}

.btn{
background:linear-gradient(45deg,#ff7a00,#ff3c00);
border:none;
color:#fff;
padding:8px 12px;
border-radius:10px;
}

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
display:flex;
justify-content:space-around;
padding:10px;
}

.nav div{
color:#aaa;
font-size:12px;
}
</style>
</head>

<body>

<div class="header">BLACK CLOUD</div>

<input class="search" placeholder="Поиск вкуса...">

<div class="tabs">
<div class="tab active">Все</div>
<div class="tab">Одноразки</div>
<div class="tab">Жидкости</div>
<div class="tab">POD</div>
</div>

<div class="grid">

<!-- ELF BAR -->
<div class="card">
<img src="https://i.imgur.com/Z6X6vQx.png">
<div class="title">ELF BAR 600</div>
<div class="sub">600 затяжек • 20мг</div>
<select>
<option>Тропик</option>
<option>Манго</option>
<option>Клубника</option>
</select>
<div class="bottom">
<div class="price">450 ₽</div>
<button class="btn">+</button>
</div>
</div>

<!-- VAPENGO -->
<div class="card">
<img src="https://i.imgur.com/jr6pf6F.png">
<div class="title">Vapengo 6000</div>
<div class="sub">6000 затяжек • 20мг</div>
<select>
<option>Арбуз лёд</option>
<option>Черника</option>
<option>Виноград</option>
</select>
<div class="bottom">
<div class="price">1800 ₽</div>
<button class="btn">+</button>
</div>
</div>

<!-- BRUSKO -->
<div class="card">
<img src="https://i.imgur.com/e6X3kGf.png">
<div class="title">BRUSKO SALT</div>
<div class="sub">30мл • 20мг</div>
<select>
<option>Маракуйя</option>
<option>Кола</option>
<option>Мята</option>
</select>
<div class="bottom">
<div class="price">450 ₽</div>
<button class="btn">+</button>
</div>
</div>

<!-- POD -->
<div class="card">
<img src="https://i.imgur.com/Kq8Y5vL.png">
<div class="title">Caliburn GZ2</div>
<div class="sub">750 mAh</div>
<select>
<option>750 mAh</option>
</select>
<div class="bottom">
<div class="price">900 ₽</div>
<button class="btn">+</button>
</div>
</div>

<!-- MORE ITEMS -->
<div class="card">
<img src="https://i.imgur.com/Yo8QXJX.png">
<div class="title">ELF BAR 5000</div>
<div class="sub">5000 затяжек</div>
<select>
<option>Персик лёд</option>
<option>Яблоко</option>
</select>
<div class="bottom">
<div class="price">1300 ₽</div>
<button class="btn">+</button>
</div>
</div>

<div class="card">
<img src="https://i.imgur.com/8Km9tLL.png">
<div class="title">RF350</div>
<div class="sub">POD система</div>
<select>
<option>1800 mAh</option>
</select>
<div class="bottom">
<div class="price">700 ₽</div>
<button class="btn">+</button>
</div>
</div>

</div>

<div class="nav">
<div>🏠</div>
<div>🔍</div>
<div>🛒</div>
</div>

</body>
</html>
